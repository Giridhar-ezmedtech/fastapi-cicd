name: Deploy FastAPI to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          debug: true
          script: |
            # Navigate to home directory
            cd ~
            
            # Clone the repository if it doesn't exist, otherwise pull latest changes
            if [ ! -d "fastapi-cicd" ]; then
              git clone https://github.com/Giridhar-ezmedtech/fastapi-cicd.git fastapi-cicd
            fi
            cd fastapi-cicd
            git pull origin main
            
            # Initialize virtual environment if it doesn't exist
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # Activate virtual environment and install requirements
            source venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt
            
            # Start or restart the FastAPI application with PM2
            pm2 describe fastapi-app > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              pm2 restart fastapi-app
            else
              pm2 start "venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000" --name "fastapi-app"
            fi
            
            # Save the PM2 list to persist across server restarts (optional but recommended)
            pm2 save
